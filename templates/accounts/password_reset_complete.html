{% extends 'base.html' %}

{% block title %}Password Reset Complete - ELECTRA{% endblock %}

{% block content %}
<!-- ========================================
     PASSWORD RESET - COMPLETE
     ======================================== -->
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <!-- Card Header -->
            <div class="card-header text-center">
                <h4 class="mb-0">
                    <i class="fas fa-check-circle"></i> Password Reset Complete
                </h4>
            </div>

            <!-- Card Body -->
            <div class="card-body p-4 text-center">
                <!-- Success Icon -->
                <div class="mb-4">
                    <i class="fas fa-check-circle text-success fa-5x"></i>
                </div>

                <!-- Message -->
                <h5>Password Successfully Reset!</h5>
                <p class="text-muted">
                    Your password has been set. You can now log in with your new password.
                </p>

                <!-- Login Button -->
                <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg mt-3">
                    <i class="fas fa-sign-in-alt"></i> Login Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
